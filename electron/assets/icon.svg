<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1d27"/>
      <stop offset="100%" style="stop-color:#0f1117"/>
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5a623"/>
      <stop offset="100%" style="stop-color:#e8913a"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)" stroke="#2e3350" stroke-width="8"/>
  <!-- Shield body -->
  <path d="M256 80 L400 150 L400 280 Q400 380 256 440 Q112 380 112 280 L112 150 Z"
        fill="url(#shield)" opacity="0.95"/>
  <!-- Shield inner highlight -->
  <path d="M256 110 L370 168 L370 275 Q370 358 256 410 Q142 358 142 275 L142 168 Z"
        fill="#1a1d27" opacity="0.85"/>
  <!-- Broom/scrub icon in center -->
  <g transform="translate(256,260)" fill="#f5a623">
    <!-- Broom handle -->
    <rect x="-6" y="-90" width="12" height="120" rx="4" fill="#f5a623"/>
    <!-- Broom head -->
    <rect x="-50" y="30" width="100" height="30" rx="8" fill="#f5a623"/>
    <!-- Bristles -->
    <rect x="-42" y="60" width="8" height="28" rx="2" fill="#e8913a"/>
    <rect x="-28" y="60" width="8" height="32" rx="2" fill="#e8913a"/>
    <rect x="-14" y="60" width="8" height="28" rx="2" fill="#e8913a"/>
    <rect x="0" y="60" width="8" height="34" rx="2" fill="#e8913a"/>
    <rect x="14" y="60" width="8" height="28" rx="2" fill="#e8913a"/>
    <rect x="28" y="60" width="8" height="32" rx="2" fill="#e8913a"/>
    <rect x="42" y="60" width="8" height="28" rx="2" fill="#e8913a" transform="translate(-8,0)"/>
  </g>
  <!-- HB text -->
  <text x="256" y="195" text-anchor="middle" font-family="sans-serif" font-weight="900"
        font-size="52" fill="#f5a623" letter-spacing="-2">HB</text>
</svg>
